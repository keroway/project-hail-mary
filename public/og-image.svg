  <!-- Top label -->
  <text x="600" y="148" text-anchor="middle" font-family="'Space Mono', 'Courier New', monospace" font-size="16" letter-spacing="6" fill="#3b82f6" opacity="0.9">SCIENCE GUIDE</text>

  <!-- Main title - line 1 -->
  <text x="600" y="258" text-anchor="middle" font-family="'Shippori Mincho', 'Noto Serif JP', serif" font-size="62" font-weight="700" fill="white" opacity="0.95">プロジェクト・</text>

  <!-- Main title - line 2 -->
  <text x="600" y="338" text-anchor="middle" font-family="'Shippori Mincho', 'Noto Serif JP', serif" font-size="62" font-weight="700" fill="white" opacity="0.95">ヘイルメアリー</text>

  <!-- Subtitle -->
  <text x="600" y="406" text-anchor="middle" font-family="'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', sans-serif" font-size="26" fill="#94a3b8" letter-spacing="2">科学入門ガイド</text>

  <!-- Subject tags -->
  <g font-family="'Space Mono', 'Courier New', monospace" font-size="13" letter-spacing="1">
    <rect x="230" y="448" width="78" height="26" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="269" y="466" text-anchor="middle" fill="#60a5fa">物理</text>

    <rect x="324" y="448" width="78" height="26" rx="4" fill="#2d1b4e" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.6"/>
    <text x="363" y="466" text-anchor="middle" fill="#a78bfa">化学</text>

    <rect x="418" y="448" width="78" height="26" rx="4" fill="#14291a" stroke="#22c55e" stroke-width="1" stroke-opacity="0.6"/>
    <text x="457" y="466" text-anchor="middle" fill="#4ade80">生物</text>

    <rect x="512" y="448" width="78" height="26" rx="4" fill="#2a1f00" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.6"/>
    <text x="551" y="466" text-anchor="middle" fill="#fbbf24">数学</text>

    <rect x="624" y="448" width="346" height="26" rx="4" fill="#0d1520" stroke="#475569" stroke-width="1" stroke-opacity="0.4"/>
    <text x="797" y="466" text-anchor="middle" fill="#64748b">中学2年生のための SF 科学読書補助資料</text>
  </g>

