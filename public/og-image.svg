<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a3a"/>
      <stop offset="100%" stop-color="#03050f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="87" cy="43" r="1.2"/><circle cx="213" cy="112" r="0.8"/>
    <circle cx="456" cy="28" r="1.5"/><circle cx="678" cy="67" r="0.9"/>
    <circle cx="890" cy="34" r="1.1"/><circle cx="1050" cy="89" r="1.3"/>
    <circle cx="1140" cy="45" r="0.7"/><circle cx="34" cy="198" r="0.9"/>
    <circle cx="167" cy="267" r="1.4"/><circle cx="312" cy="189" r="0.8"/>
    <circle cx="534" cy="145" r="1.2"/><circle cx="765" cy="178" r="0.6"/>
    <circle cx="923" cy="123" r="1.0"/><circle cx="1089" cy="201" r="0.9"/>
    <circle cx="1178" cy="156" r="1.3"/><circle cx="56" cy="478" r="1.1"/>
    <circle cx="189" cy="512" r="0.7"/><circle cx="378" cy="489" r="1.4"/>
    <circle cx="601" cy="534" r="0.8"/><circle cx="812" cy="501" r="1.2"/>
    <circle cx="967" cy="567" r="0.9"/><circle cx="1112" cy="489" r="1.0"/>
    <circle cx="1167" cy="543" r="0.7"/><circle cx="78" cy="589" r="1.3"/>
    <circle cx="289" cy="601" r="0.8"/><circle cx="478" cy="618" r="1.1"/>
  </g>

  <!-- Glow accent -->
  <circle cx="600" cy="315" r="350" fill="url(#glow)"/>

  <!-- Orbit ring (decorative) -->
