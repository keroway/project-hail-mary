<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#03050f"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Tiny stars -->
  <circle cx="12" cy="14" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="52" cy="10" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="8" cy="42" r="0.7" fill="#ffffff" opacity="0.35"/>
  <circle cx="54" cy="48" r="0.9" fill="#ffffff" opacity="0.45"/>
  <!-- Rocket body -->
  <g transform="translate(32,30) rotate(-45)">
    <!-- Nose cone -->
    <path d="M0,-22 C3,-18 4,-12 4,-6 L-4,-6 C-4,-12 -3,-18 0,-22Z" fill="#e8e0d0"/>
    <!-- Body -->
    <rect x="-4" y="-6" width="8" height="16" rx="1" fill="#d0c8b8"/>
    <!-- Window -->
    <circle cx="0" cy="1" r="2.2" fill="#4e9bff" opacity="0.9"/>
    <circle cx="0" cy="1" r="1.4" fill="#7ab8ff" opacity="0.6"/>
    <!-- Fins -->
    <path d="M-4,6 L-9,12 L-4,10Z" fill="#ff6b4a"/>
    <path d="M4,6 L9,12 L4,10Z" fill="#ff6b4a"/>
    <!-- Exhaust flame -->
    <path d="M-3,10 L0,20 L3,10Z" fill="#ffaa33" opacity="0.9"/>
    <path d="M-1.5,10 L0,17 L1.5,10Z" fill="#ffe066" opacity="0.8"/>
  </g>
</svg>
